<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kozi Przybornik</title>
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#031605">
  <style>
    :root {
      --bg: radial-gradient(circle at 20% 20%, rgba(0, 255, 128, 0.06), transparent 25%),
             radial-gradient(circle at 80% 0%, rgba(0, 255, 128, 0.08), transparent 35%),
             #031605;
      --panel: #000;
      --border: #16c60c;
      --text: #9cf09c;
      --accent: #16c60c;
      --accent-dark: #0d7a07;
      --glow: 0 0 25px rgba(22, 198, 12, 0.45);
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
      font-family: "Consolas", "Fira Code", "Source Code Pro", monospace;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(860px, 100%);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--glow);
      padding: 32px 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .logo {
      max-width: clamp(220px, 40vw, 320px);
      width: 100%;
      display: block;
    }

    .actions {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px 20px;
      align-items: start;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stack.right {
      align-items: stretch;
    }

    .btn {
      appearance: none;
      border: 2px solid var(--border);
      background: rgba(22, 198, 12, 0.08);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 15px;
      text-decoration: none;
      font-weight: 600;
      text-align: center;
      display: block;
      width: 100%;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(22, 198, 12, 0.3);
      background: rgba(22, 198, 12, 0.14);
    }

    .btn:active {
      transform: translateY(0);
      background: rgba(22, 198, 12, 0.22);
    }

    .note {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }
    .pushCtaWrap {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .pushCta {
      width: auto;
      border-color: #ff3b30;
      background: rgba(255, 59, 48, 0.2);
      color: #ffe5e3;
      box-shadow: 0 0 14px rgba(255, 59, 48, 0.35);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .pushCta:hover {
      background: rgba(255, 59, 48, 0.28);
      box-shadow: 0 0 16px rgba(255, 59, 48, 0.45);
    }

    .pushCta:active {
      background: rgba(255, 59, 48, 0.36);
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="wrath-glory-logo-warhammer.png" alt="Logo Wrath &amp; Glory">

    <div class="actions">
      <div class="stack right">
        <a class="btn" data-infoczytnik-link href="../Infoczytnik/Infoczytnik.html">Infoczytnik</a>
      </div>
      <div class="stack">
        <a class="btn" data-datavault-link href="https://cutelittlegoat.github.io/WrathAndGlory/DataVault/index.html" target="_self">Skarbiec Danych</a>
        <p class="note" data-admin-only="true">aby wejść do panelu admina dopisz do adresu <strong>index.html?admin=1</strong></p>
      </div>
      <div class="stack" data-admin-only="true">
        <a class="btn" href="../GeneratorNazw/index.html">Generator Nazw</a>
      </div>
      <div class="stack" data-admin-only="true">
        <a class="btn" href="https://cutelittlegoat.github.io/WrathAndGlory/GeneratorNPC/" target="_self">Generator NPC</a>
      </div>
      <div class="stack" data-admin-only="true">
        <a class="btn" href="../Audio/index.html">Audio</a>
        <p class="note">aby wejść do panelu admina dopisz do adresu <strong>index.html?admin=1</strong></p>
      </div>
      <div class="stack">
        <a class="btn" data-images-link href="#" target="_blank" rel="noopener noreferrer">Obrazki</a>
      </div>
      <div class="stack">
        <a class="btn" data-map-link href="#" target="_blank" rel="noopener noreferrer">Mapa</a>
      </div>
      <div class="stack">
        <a class="btn" href="https://cutelittlegoat.github.io/WrathAndGlory/Kalkulator/" target="_self">Kalkulator</a>
      </div>
      <div class="stack">
        <a class="btn" href="../DiceRoller/index.html">Rzut kośćmi</a>
      </div>
    </div>
    <div class="pushCtaWrap">
      <button class="btn pushCta" id="pushBtn" type="button">Włącz powiadomienia</button>
    </div>
  </main>
  <script src="../Infoczytnik/config/web-push-config.js"></script>
  <script>
    const isAdmin = new URLSearchParams(window.location.search).get("admin") === "1";
    const adminOnlyElements = document.querySelectorAll('[data-admin-only="true"]');
    if (!isAdmin) {
      adminOnlyElements.forEach((element) => element.remove());
    }

    const infoczytnikLink = document.querySelector("[data-infoczytnik-link]");
    if (infoczytnikLink) {
      infoczytnikLink.href = isAdmin
        ? "https://cutelittlegoat.github.io/WrathAndGlory/Infoczytnik/index.html"
        : "../Infoczytnik/Infoczytnik.html";
    }

    const dataVaultLink = document.querySelector("[data-datavault-link]");
    if (dataVaultLink) {
      dataVaultLink.href = isAdmin
        ? "https://cutelittlegoat.github.io/WrathAndGlory/DataVault/index.html?admin=1"
        : "https://cutelittlegoat.github.io/WrathAndGlory/DataVault/index.html";
    }

    const mapLink = document.querySelector("[data-map-link]");
    const imagesLink = document.querySelector("[data-images-link]");
    const linkConfigPath = "ZmienneHiperlacza.md";

    const applyDynamicLinks = (links) => {
      if (mapLink && links.mapa) {
        mapLink.href = links.mapa;
      }
      if (imagesLink && links.obrazki) {
        imagesLink.href = links.obrazki;
      }
    };

    fetch(linkConfigPath)
      .then((response) => {
        if (!response.ok) {
          throw new Error(`Nie udało się pobrać ${linkConfigPath}`);
        }
        return response.text();
      })
      .then((text) => {
        const links = {};
        text.split(/\r?\n/).forEach((line) => {
          const match = line.match(/^(Mapa|Obrazki)\s*:\s*(\S+)/);
          if (match) {
            const key = match[1].toLowerCase();
            links[key] = match[2];
          }
        });
        applyDynamicLinks(links);
      })
      .catch((error) => {
        console.warn("Nie udało się wczytać zmiennych hiperłączy.", error);
      });

    const pushButton = document.getElementById("pushBtn");

    function urlBase64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
      const rawData = atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; i += 1) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    function getPushConfig() {
      const pushConfig = window.infWebPushConfig || {};
      const hasVapidPublicKey = typeof pushConfig.vapidPublicKey === "string" && pushConfig.vapidPublicKey.trim().length > 0;
      const hasSubscribeEndpoint = typeof pushConfig.subscribeEndpoint === "string" && pushConfig.subscribeEndpoint.trim().length > 0;

      return {
        pushConfig,
        hasVapidPublicKey,
        hasSubscribeEndpoint,
        isConfigured: hasVapidPublicKey && hasSubscribeEndpoint
      };
    }

    function setPushButtonMessage(message, isError = false) {
      if (!pushButton) return;

      pushButton.textContent = message;
      pushButton.title = message;
      if (isError) {
        pushButton.dataset.state = "error";
      } else {
        delete pushButton.dataset.state;
      }
    }

    function refreshPushButtonState() {
      if (!pushButton) return;

      const pushState = getPushConfig();
      if (pushState.isConfigured) return;

      pushButton.disabled = true;
      pushButton.textContent = "Powiadomienia: brak konfiguracji";
      pushButton.title = "Uzupełnij Infoczytnik/config/web-push-config.js (vapidPublicKey + subscribeEndpoint).";
    }

    async function ensureServiceWorkerRegistration() {
      if (!("serviceWorker" in navigator)) return null;
      return navigator.serviceWorker.register("../service-worker.js");
    }

    async function enablePushNotifications() {
      const pushState = getPushConfig();
      const pushConfig = pushState.pushConfig;

      if (!pushState.isConfigured) {
        refreshPushButtonState();
        console.warn("Brak konfiguracji Web Push (vapidPublicKey/subscribeEndpoint) w Infoczytnik/config/web-push-config.js");
        return;
      }

      if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
        setPushButtonMessage("Przeglądarka nie obsługuje Web Push.", true);
        pushButton.disabled = true;
        return;
      }

      const permission = await Notification.requestPermission();
      if (permission !== "granted") {
        setPushButtonMessage("Wymagana zgoda na powiadomienia w przeglądarce.", true);
        return;
      }

      await ensureServiceWorkerRegistration();
      const registration = await navigator.serviceWorker.ready;
      const existingSubscription = await registration.pushManager.getSubscription();
      const subscription = existingSubscription || await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(pushConfig.vapidPublicKey)
      });

      const response = await fetch(pushConfig.subscribeEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          source: "main-launcher",
          createdAt: Date.now(),
          subscription
        })
      });

      if (!response.ok) {
        const errorText = await response.text().catch(() => "");
        throw new Error(`Błąd zapisu subskrypcji: ${response.status} ${errorText}`);
      }

      setPushButtonMessage("Powiadomienia aktywne");
      pushButton.disabled = true;
    }

    if (pushButton) {
      pushButton.addEventListener("click", () => {
        enablePushNotifications().catch((error) => {
          console.error(error);
          const errorMessage = error?.message ? String(error.message) : "Nieznany błąd";
          setPushButtonMessage(`Błąd Web Push: ${errorMessage}`, true);
        });
      });
    }

    refreshPushButtonState();


    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        ensureServiceWorkerRegistration().catch((error) => {
          console.warn("Rejestracja Service Workera nie powiodła się.", error);
        });
      });
    }
  </script>
</body>
</html>
