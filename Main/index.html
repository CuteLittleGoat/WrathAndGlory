<!DOCTYPE html>
<!-- Plik interfejsu modułu: struktura sekcji i elementy interaktywne / Module UI file: section structure and interactive elements -->
<html lang="pl">
<!-- Sekcja konfiguracji dokumentu i zasobów / Document configuration and asset section -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kozi Przybornik</title>
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#031605">
  <meta name="theme-color" content="#031605" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#031605" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark">
  <!-- Lokalna sekcja stylów dla bieżącego widoku / Local style section for current view -->
<style>
    :root {
      --bg: radial-gradient(circle at 20% 20%, rgba(0, 255, 128, 0.06), transparent 25%),
             radial-gradient(circle at 80% 0%, rgba(0, 255, 128, 0.08), transparent 35%),
             #031605;
      --panel: #000;
      --border: #16c60c;
      --text: #9cf09c;
      --accent: #16c60c;
      --accent-dark: #0d7a07;
      --glow: 0 0 25px rgba(22, 198, 12, 0.45);
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
      font-family: "Consolas", "Fira Code", "Source Code Pro", monospace;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #031605;
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      background: var(--bg);
    }

    main {
      width: min(860px, 100%);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--glow);
      padding: 32px 32px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .logo {
      max-width: clamp(220px, 40vw, 320px);
      width: 100%;
      height: auto;
      display: block;
    }

    .actions {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px 20px;
      align-items: start;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stack.right {
      align-items: stretch;
    }

    .btn {
      appearance: none;
      border: 2px solid var(--border);
      background: rgba(22, 198, 12, 0.08);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 15px;
      text-decoration: none;
      font-weight: 600;
      text-align: center;
      display: block;
      width: 100%;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(22, 198, 12, 0.3);
      background: rgba(22, 198, 12, 0.14);
    }

    .btn:active {
      transform: translateY(0);
      background: rgba(22, 198, 12, 0.22);
    }

    .note {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }
  </style>
</head>
<!-- Główna sekcja widoczna dla użytkownika / Main section visible to the user -->
<body>
  <!-- Główna zawartość modułu / Main module content -->
<main>
    <!-- MIEJSCE ROZSZERZENIA JĘZYKÓW / LANGUAGE EXTENSION POINT: wszystkie stałe etykiety przycisków i linków poniżej trzeba zaktualizować przy dodawaniu nowej wersji językowej (np. FR/DE), ponieważ Main nie ma przełącznika języka. -->

    <img
      class="logo"
      src="wrath-glory-logo-warhammer.png"
      alt="Logo Wrath &amp; Glory"
      width="1366"
      height="768"
    >

    <div class="actions">
      <div class="stack right">
        <!-- WAŻNE: Po skopiowaniu aplikacji na inny serwer sprawdź i zaktualizuj wszystkie linki modułów (relatywne i zewnętrzne), aby wskazywały zasoby danej grupy. / IMPORTANT: After copying the app to another server, verify and update all module links (relative and external) so they point to that group's resources. -->
        <a class="btn" data-infoczytnik-link href="../Infoczytnik/Infoczytnik.html">Infoczytnik</a>
      </div>
      <div class="stack">
        <a class="btn" data-datavault-link href="../DataVault/index.html" target="_self">Skarbiec Danych</a>
        <p class="note" data-admin-only="true">aby wejść do panelu admina dopisz do adresu <strong>index.html?admin=1</strong></p>
      </div>
      <div class="stack" data-admin-only="true">
        <a class="btn" href="../GeneratorNazw/index.html">Generator Nazw</a>
      </div>
      <div class="stack" data-admin-only="true">
        <a class="btn" href="../GeneratorNPC/" target="_self">Generator NPC</a>
      </div>
      <div class="stack" data-admin-only="true">
        <a class="btn" href="../Audio/index.html">Audio</a>
        <p class="note">aby wejść do panelu admina dopisz do adresu <strong>index.html?admin=1</strong></p>
      </div>
      <div class="stack">
        <!-- WAŻNE: Link "Obrazki" jest ładowany dynamicznie z pliku Main/ZmienneHiperlacza.md — każda grupa musi podać własny URL na swoim serwerze. / IMPORTANT: The "Images" link is loaded dynamically from Main/ZmienneHiperlacza.md — each group must provide its own URL on its own server. -->
        <a class="btn" data-images-link href="#" target="_blank" rel="noopener noreferrer">Obrazki</a>
      </div>
      <div class="stack">
        <!-- WAŻNE: Link "Mapa" jest ładowany dynamicznie z pliku Main/ZmienneHiperlacza.md — każda grupa musi podać własny URL na swoim serwerze. / IMPORTANT: The "Map" link is loaded dynamically from Main/ZmienneHiperlacza.md — each group must provide its own URL on its own server. -->
        <a class="btn" data-map-link href="#" target="_blank" rel="noopener noreferrer">Mapa</a>
      </div>
      <div class="stack">
        <a class="btn" href="../Kalkulator/" target="_self">Kalkulator</a>
      </div>
      <div class="stack">
        <a class="btn" href="../DiceRoller/index.html">Rzut kośćmi</a>
      </div>
    </div>
  </main>
  <!-- Skrypt odpowiedzialny za interakcję strony / Script responsible for page interactions -->
  <script>
    const isAdmin = new URLSearchParams(window.location.search).get("admin") === "1";
    const adminOnlyElements = document.querySelectorAll('[data-admin-only="true"]');
    if (!isAdmin) {
      adminOnlyElements.forEach((element) => element.remove());
    }

    const infoczytnikLink = document.querySelector("[data-infoczytnik-link]");
    if (infoczytnikLink) {
      infoczytnikLink.href = isAdmin
        ? "../Infoczytnik/index.html"
        : "../Infoczytnik/Infoczytnik.html";
    }

    const dataVaultLink = document.querySelector("[data-datavault-link]");
    if (dataVaultLink) {
      dataVaultLink.href = isAdmin
        ? "../DataVault/index.html?admin=1"
        : "../DataVault/index.html";
    }

    const mapLink = document.querySelector("[data-map-link]");
    const imagesLink = document.querySelector("[data-images-link]");
    const linkConfigPath = "ZmienneHiperlacza.md";

    const applyDynamicLinks = (links) => {
      if (mapLink && links.mapa) {
        mapLink.href = links.mapa;
      }
      if (imagesLink && links.obrazki) {
        imagesLink.href = links.obrazki;
      }
    };

    fetch(linkConfigPath)
      .then((response) => {
        if (!response.ok) {
          throw new Error(`Nie udało się pobrać ${linkConfigPath}`);
        }
        return response.text();
      })
      .then((text) => {
        const links = {};
        text.split(/\r?\n/).forEach((line) => {
          const match = line.match(/^(Mapa|Obrazki)\s*:\s*(\S+)/);
          if (match) {
            const key = match[1].toLowerCase();
            links[key] = match[2];
          }
        });
        applyDynamicLinks(links);
      })
      .catch((error) => {
        console.warn("Nie udało się wczytać zmiennych hiperłączy.", error);
      });

  </script>
</body>
</html>
