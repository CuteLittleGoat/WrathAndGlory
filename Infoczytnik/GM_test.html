<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Infoczytnik - panel GM</title>
  <script>
    (function autoCacheBust(){
      const INF_VERSION = "2026-03-31_15-18-03";
      window.__dsVersion = INF_VERSION;
      const url = new URL(window.location.href);
      if (url.searchParams.get("v") !== INF_VERSION) {
        url.searchParams.set("v", INF_VERSION);
        window.location.replace(url.toString());
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;700&family=Rajdhani:wght@400;600&family=Black+Ops+One&family=Staatliches&family=Orbitron:wght@400;700&family=Questrial&family=Russo+One&family=Caveat:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root{--text:#eaeaea;--muted:#bdbdbd;--accent:#ffd27a;--border:#2a2a2a;--panel:rgba(18,18,18,.92)}
    *{box-sizing:border-box} body{margin:0;padding:18px;font-family:Arial,sans-serif;background:linear-gradient(180deg,#070707,#0f0f0f);color:var(--text)}
    .wrap{max-width:1080px;margin:0 auto}.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
    h1{margin:0 0 10px;color:var(--accent)} label{display:block;margin:10px 0 6px;color:var(--muted);font-size:13px}
    select,textarea,input{width:100%;background:#0f0f0f;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
    textarea{min-height:120px;resize:vertical}.row{display:flex;gap:12px;flex-wrap:wrap}.col{flex:1;min-width:280px}
    .inline{display:flex;gap:10px;align-items:center}.toggles{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0}
    .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}button{flex:1;min-width:160px;padding:12px;border-radius:12px;border:1px solid var(--border);background:#1d1d1d;color:var(--text);cursor:pointer}
    button.primary{background:linear-gradient(180deg,#3a2a12,#1c1408);color:var(--accent)} button.warn{background:linear-gradient(180deg,#1c0c0c,#120606);color:#ffb3b3}
    .small{font-size:12px;color:var(--muted);margin-top:6px}.status{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--border)}
    .previewModeRow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px}
    .previewModeRow .small{margin-top:0}
    .livePreviewBox{margin-top:10px;padding:12px;border-radius:10px;min-height:150px;background-size:cover;background-position:center;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
    .previewLogo{position:absolute;top:10px;right:10px;width:84px;max-height:84px;object-fit:contain;opacity:.9;display:none}
    .previewText{position:relative;z-index:2;white-space:pre-line;text-shadow:0 1px 2px rgba(0,0,0,.8)}
    .disabled-note{opacity:.6}
    .importLog{min-height:120px;font-family:Consolas,monospace;white-space:pre}
    .importRow{display:flex;gap:10px;align-items:center}
    .importRow .importLog{flex:1;min-width:0}
    .importUpdateBtn{flex:0 0 clamp(210px,32%,320px);min-width:210px;align-self:center}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
    .chip{display:inline-flex;align-items:center;gap:7px;padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.18);cursor:pointer;user-select:none;font-size:13px;color:#eaeaea;white-space:nowrap}
    .chip .swatch{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-2px;border:1px solid rgba(0,0,0,.25);flex:0 0 12px}
    .pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  </style>
</head>
<body>
<div class="wrap"><h1>Infoczytnik - panel GM</h1><div class="card">
  <div class="row">
    <div class="col">
      <label>Tło</label><select id="backgroundSelect"></select>
      <label>Logo</label><select id="logoSelect"></select>
      <label>Zestaw fillerów</label><select id="fillerSelect"></select>
      <label>Font</label><select id="fontSelect"></select>
      <label>Audio wiadomości</label><select id="audioSelect"></select>
      <div class="toggles">
        <label class="inline"><input type="checkbox" id="showLogo" checked style="width:auto"> Logo</label>
        <label class="inline"><input type="checkbox" id="movingOverlay" checked style="width:auto"> Prostokąt cienia</label>
        <label class="inline"><input type="checkbox" id="flicker" checked style="width:auto"> Flicker</label>
        <label class="inline"><input type="checkbox" id="fillersEnabled" checked style="width:auto"> Fillery</label>
        <label class="inline"><input type="checkbox" id="audioEnabled" checked style="width:auto"> Audio</label>
      </div>
      <div id="flickerHint" class="small"></div>
      <label>Ilość linii fillerów</label><input type="number" id="fillerLineCount" min="1" max="5" value="3">
      <label>Wysokość stref Prefix/Suffix (linie)</label><input type="number" id="fillerBandLines" min="1" max="6" value="2">
      <div id="fillersHint" class="small">Fillery aktywne.</div>
    </div>
    <div class="col">
      <label>Kolor fontu (treść wiadomości)</label>
      <div class="pair"><input type="text" id="messageColorText" value="#00ff66" placeholder="#RRGGBB"><input type="color" id="messageColorPicker" value="#00ff66"></div>
      <div class="chips" id="messageColorChips">
        <div class="chip" data-target="msg" data-color="#00ff66"><span class="swatch" style="background:#00ff66"></span><span>Zielony</span></div>
        <div class="chip" data-target="msg" data-color="#ff3333"><span class="swatch" style="background:#ff3333"></span><span>Czerwony</span></div>
        <div class="chip" data-target="msg" data-color="#d4af37"><span class="swatch" style="background:#d4af37"></span><span>Złoty</span></div>
        <div class="chip" data-target="msg" data-color="#ffffff"><span class="swatch" style="background:#ffffff"></span><span>Biały</span></div>
      </div>
      <label>Wielkość fontu (treść) px</label><input type="number" id="msgFontSize" min="12" max="80" value="20">
      <label>Kolor Prefix + Suffix (wspólny)</label>
      <div class="pair"><input type="text" id="psColorText" value="#ffffff" placeholder="#RRGGBB"><input type="color" id="psColorPicker" value="#ffffff"></div>
      <div class="chips" id="psColorChips">
        <div class="chip" data-target="ps" data-color="#00ff66"><span class="swatch" style="background:#00ff66"></span><span>Zielony</span></div>
        <div class="chip" data-target="ps" data-color="#ff3333"><span class="swatch" style="background:#ff3333"></span><span>Czerwony</span></div>
        <div class="chip" data-target="ps" data-color="#d4af37"><span class="swatch" style="background:#d4af37"></span><span>Złoty</span></div>
        <div class="chip" data-target="ps" data-color="#ffffff"><span class="swatch" style="background:#ffffff"></span><span>Biały</span></div>
      </div>
      <label>Wielkość fontu Prefix + Suffix px</label><input type="number" id="psFontSize" min="10" max="60" value="12">

      <div class="previewModeRow">
        <span class="small">Podgląd:</span>
        <label class="inline"><input type="radio" name="previewMode" id="previewModeCrop" value="crop" checked style="width:auto"> Wycinek</label>
        <label class="inline"><input type="radio" name="previewMode" id="previewModeFull" value="full" style="width:auto"> Całość</label>
      </div>
      <div class="livePreviewBox" id="livePreview">
        <img id="previewLogo" class="previewLogo" alt="logo preview">
        <div class="previewText" id="previewPrefix"></div>
        <div class="previewText" id="previewMsg">Lorem ipsum dolor sit amet...</div>
        <div class="previewText" id="previewSuffix"></div>
      </div>
    </div>
  </div>

  <label>Treść komunikatu</label>
  <textarea id="message" placeholder="Wpisz komunikat dla graczy..."></textarea>

  <div class="btnrow">
    <button class="primary" id="sendBtn">Wyślij</button>
    <button class="warn" id="pingBtn">Ping</button>
    <button id="clearMessageBtn">Wyczyść komunikat</button>
    <button id="restoreDefaultsBtn">Przywróć domyślne</button>
    <button id="rerollFillersBtn">Wylosuj fillery</button>
  </div>

  <label>Log importu</label>
  <div class="importRow">
    <textarea id="importLog" class="importLog" readonly></textarea>
    <button id="updateDataBtn" class="primary importUpdateBtn" type="button">Aktualizuj dane z XLSX</button>
  </div>

  <div class="small">Status: <span class="status" id="status">…</span></div>
</div></div>

<script src="config/firebase-config.js"></script>
<script src="config/web-push-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.8/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.8/firebase-firestore-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
const DEFAULT_FORM_STATE = { backgroundId:7, logoId:1, fillerId:1, fontId:1, audioId:1, showLogo:false, movingOverlay:false, flicker:false, fillersEnabled:true, audioEnabled:true, fillerLineCount:3, fillerBandLines:2, messageColor:'#00ff66', prefixSuffixColor:'#ffffff', msgFontSize:20, psFontSize:12, previewMode:'crop' };
const FONT_FALLBACK = ', Calibri, Arial, sans-serif';
const PING_URL = 'assets/audios/ping/Ping.mp3?v=' + encodeURIComponent(window.__dsVersion || '');
const PREVIEW_MODE_KEY = 'infoczytnik.gm.previewMode';

if(!window.firebaseConfig){ alert('Brak window.firebaseConfig'); throw new Error('Missing firebase config'); }
firebase.initializeApp(window.firebaseConfig);
const db = firebase.firestore();
const currentRef = db.collection('dataslate').doc('current');

const el = {
  backgroundSelect:document.getElementById('backgroundSelect'), logoSelect:document.getElementById('logoSelect'), fillerSelect:document.getElementById('fillerSelect'), fontSelect:document.getElementById('fontSelect'), audioSelect:document.getElementById('audioSelect'),
  showLogo:document.getElementById('showLogo'), movingOverlay:document.getElementById('movingOverlay'), flicker:document.getElementById('flicker'), fillersEnabled:document.getElementById('fillersEnabled'), audioEnabled:document.getElementById('audioEnabled'),
  fillerLineCount:document.getElementById('fillerLineCount'), fillerBandLines:document.getElementById('fillerBandLines'), fillersHint:document.getElementById('fillersHint'), flickerHint:document.getElementById('flickerHint'), messageColorText:document.getElementById('messageColorText'), messageColorPicker:document.getElementById('messageColorPicker'), msgFontSize:document.getElementById('msgFontSize'),
  psColorText:document.getElementById('psColorText'), psColorPicker:document.getElementById('psColorPicker'), psFontSize:document.getElementById('psFontSize'),
  previewModeCrop:document.getElementById('previewModeCrop'), previewModeFull:document.getElementById('previewModeFull'),
  previewPrefix:document.getElementById('previewPrefix'), previewMsg:document.getElementById('previewMsg'), previewSuffix:document.getElementById('previewSuffix'), livePreview:document.getElementById('livePreview'), previewLogo:document.getElementById('previewLogo'),
  message:document.getElementById('message'), importLog:document.getElementById('importLog'), updateDataBtn:document.getElementById('updateDataBtn'), status:document.getElementById('status'), sendBtn:document.getElementById('sendBtn'), pingBtn:document.getElementById('pingBtn'), clearMessageBtn:document.getElementById('clearMessageBtn'), restoreDefaultsBtn:document.getElementById('restoreDefaultsBtn'), rerollFillersBtn:document.getElementById('rerollFillersBtn')
};

let manifest = null;
let fillerState = {prefixLines:[], suffixLines:[]};

function setStatus(t){ el.status.textContent = t; }
function clamp(v,min,max,d){ const n=Number(v); if(!Number.isFinite(n)) return d; return Math.min(max,Math.max(min,Math.floor(n))); }
function safeGet(list,id){ return list.find(x=>x.id===Number(id)) || list[0] || null; }
function nonce(){ return String(Date.now()) + '-' + Math.random().toString(36).slice(2); }
function normalizeHexColor(v,fallback){
  const s = String(v || '').trim();
  if(/^#[0-9a-fA-F]{3}$/.test(s)){
    return '#' + s.slice(1).split('').map(ch=>ch+ch).join('').toLowerCase();
  }
  if(/^#[0-9a-fA-F]{6}$/.test(s)){ return s.toLowerCase(); }
  return fallback;
}

function isFullHexColor(v){
  return /^#[0-9a-fA-F]{3}$/.test(String(v || '').trim()) || /^#[0-9a-fA-F]{6}$/.test(String(v || '').trim());
}

function resolveHexColor(textValue,pickerValue,fallback){
  return isFullHexColor(textValue)
    ? normalizeHexColor(textValue,fallback)
    : normalizeHexColor(pickerValue,fallback);
}

function fillSelect(select,list,labelKey,styleFont){
  select.innerHTML='';
  list.forEach(item=>{
    const opt=document.createElement('option');
    opt.value=String(item.id);
    opt.textContent = `${item.id}. ${item.name}`;
    if(styleFont){ opt.style.fontFamily = `"${item[styleFont] || ''}"${FONT_FALLBACK}`; }
    select.appendChild(opt);
  });
}

function writeImportLog(lines){ el.importLog.value = (lines||[]).length ? lines.join('\n') : 'Brak błędów importu.'; }

const MANIFEST_XLSX_PATH = 'assets/data/DataSlate_manifest.xlsx';

function normalizeHeader(value){
  return String(value || '').trim().toLowerCase().replace(/[\s_\-]+/g,'');
}

function normalizeRecordKeys(rec){
  const out = {};
  Object.entries(rec || {}).forEach(([k,v])=>{ out[normalizeHeader(k)] = v; });
  return out;
}

function toInt(value, fallback){
  const n = Number(String(value ?? '').trim());
  return Number.isFinite(n) ? Math.floor(n) : fallback;
}

function toStr(value){
  return String(value ?? '').trim();
}

function toStringArray(value){
  return String(value ?? '').split(/\r?\n|\|/).map(v=>v.trim()).filter(Boolean);
}

function pickValue(rec, aliases){
  for(const key of aliases){
    if(rec[key] !== undefined && rec[key] !== null && String(rec[key]).trim() !== '') return rec[key];
  }
  return '';
}

function parseSheetRows(workbook, sheetName){
  const sheet = workbook.Sheets[sheetName];
  if(!sheet) return [];
  const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
  return rows.map(normalizeRecordKeys);
}

function buildManifestFromWorkbook(workbook){
  const logs = [];
  const mapBasic = (sheetName, cfg)=>{
    const rows = parseSheetRows(workbook, sheetName);
    if(!rows.length){ logs.push(`Brak arkusza lub pusty arkusz: ${sheetName}`); return []; }
    return rows.map((row, idx)=>{
      const id = toInt(pickValue(row,['id']), idx+1);
      const name = toStr(pickValue(row,['name','nazwa']));
      const file = toStr(pickValue(row,['file','plik','url']));
      const item = {id, name};
      item[cfg.thirdKey] = cfg.thirdKey === 'font' ? toStr(pickValue(row,['font','czcionka'])) : file;
      if(!item.name || !item[cfg.thirdKey]) logs.push(`${sheetName}: niepełny rekord ID ${id}`);
      return item;
    });
  };

  const fillersRows = parseSheetRows(workbook, 'fillers');
  if(!fillersRows.length) logs.push('Brak arkusza lub pusty arkusz: fillers');

  const manifestData = {
    backgrounds: mapBasic('backgrounds', {thirdKey:'file'}),
    logos: mapBasic('logos', {thirdKey:'file'}),
    audios: mapBasic('audios', {thirdKey:'file'}),
    fonts: mapBasic('fonts', {thirdKey:'font'}),
    fillers: fillersRows.map((row, idx)=>({
      id: toInt(pickValue(row,['id']), idx+1),
      name: toStr(pickValue(row,['name','nazwa'])),
      prefixes: toStringArray(pickValue(row,['prefixes','prefix','prefiksy','prefiksy(linie)'])),
      suffixes: toStringArray(pickValue(row,['suffixes','suffix','sufiksy','sufiksy(linie)']))
    })),
    importLog: logs
  };

  manifestData.fillers.forEach(item=>{
    if(!item.name || !item.prefixes.length || !item.suffixes.length){
      logs.push(`fillers: niepełny rekord ID ${item.id}`);
    }
  });

  return manifestData;
}

function downloadJson(filename, data){
  const blob = new Blob([JSON.stringify(data, null, 2) + '\n'], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 0);
}

async function updateDataFromXlsx(){
  if(typeof XLSX === 'undefined'){
    setStatus('Błąd: biblioteka XLSX niedostępna');
    return;
  }
  const btn = el.updateDataBtn;
  const previousLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Aktualizacja...';
  setStatus('Aktualizacja data.json z DataSlate_manifest.xlsx...');
  try{
    const response = await fetch(`${MANIFEST_XLSX_PATH}?v=${encodeURIComponent(window.__dsVersion || '')}`, {cache:'no-store'});
    if(!response.ok) throw new Error('Nie udało się pobrać DataSlate_manifest.xlsx');
    const bytes = await response.arrayBuffer();
    const workbook = XLSX.read(bytes, {type:'array'});
    const nextManifest = buildManifestFromWorkbook(workbook);
    manifest = nextManifest;
    fillSelect(el.backgroundSelect, manifest.backgrounds || []);
    fillSelect(el.logoSelect, manifest.logos || []);
    fillSelect(el.fillerSelect, manifest.fillers || []);
    fillSelect(el.fontSelect, manifest.fonts || [], 'font', 'font');
    fillSelect(el.audioSelect, manifest.audios || []);
    writeImportLog(manifest.importLog || []);
    restoreDefaults(false);
    downloadJson('data.json', nextManifest);
    setStatus('Gotowe: wygenerowano nowy data.json (plik pobrany).');
  }catch(err){
    console.error(err);
    setStatus('Błąd aktualizacji danych');
    writeImportLog([`Błąd aktualizacji: ${err.message || err}`]);
  }finally{
    btn.disabled = false;
    btn.textContent = previousLabel;
  }
}

async function loadManifest(){
  const res = await fetch(`assets/data/data.json?v=${encodeURIComponent(window.__dsVersion || '')}`);
  if(!res.ok) throw new Error('Nie udało się wczytać assets/data/data.json');
  manifest = await res.json();
  fillSelect(el.backgroundSelect, manifest.backgrounds || []);
  fillSelect(el.logoSelect, manifest.logos || []);
  fillSelect(el.fillerSelect, manifest.fillers || []);
  fillSelect(el.fontSelect, manifest.fonts || [], 'font', 'font');
  fillSelect(el.audioSelect, manifest.audios || []);
  writeImportLog(manifest.importLog || []);
  restoreDefaults(false);
}

function rerollFillers(){
  const count = clamp(el.fillerLineCount.value,1,5,3); el.fillerLineCount.value=String(count);
  const filler = safeGet(manifest.fillers || [], el.fillerSelect.value);
  const draw = (arr) => [...arr].sort(()=>Math.random()-0.5).slice(0,count);
  fillerState.prefixLines = el.fillersEnabled.checked && filler ? draw(filler.prefixes || []) : [];
  fillerState.suffixLines = el.fillersEnabled.checked && filler ? draw(filler.suffixes || []) : [];
  renderPreview();
}

function syncFlickerDependency(){
  if(!el.movingOverlay.checked){
    el.flicker.checked = false;
    el.flicker.disabled = true;
    el.flickerHint.textContent = 'Flicker wymaga włączonego prostokąta cienia.';
    el.flickerHint.className = 'small disabled-note';
  } else {
    el.flicker.disabled = false;
    el.flickerHint.textContent = '';
    el.flickerHint.className = 'small';
  }
}

function getPreviewMode(){
  if(el.previewModeFull.checked) return 'full';
  return 'crop';
}

function setPreviewMode(mode){
  const targetMode = mode === 'full' ? 'full' : 'crop';
  el.previewModeFull.checked = targetMode === 'full';
  el.previewModeCrop.checked = targetMode === 'crop';
  el.livePreview.style.backgroundSize = targetMode === 'full' ? 'contain' : 'cover';
  try{ localStorage.setItem(PREVIEW_MODE_KEY, targetMode); }catch(_){}
}

function loadSavedPreviewMode(){
  let savedMode = DEFAULT_FORM_STATE.previewMode;
  try{
    const persisted = localStorage.getItem(PREVIEW_MODE_KEY);
    if(persisted === 'crop' || persisted === 'full') savedMode = persisted;
  }catch(_){}
  setPreviewMode(savedMode);
}

function renderPreview(){
  syncFlickerDependency();
  const bg = safeGet(manifest.backgrounds || [], el.backgroundSelect.value);
  const logo = safeGet(manifest.logos || [], el.logoSelect.value);
  const font = safeGet(manifest.fonts || [], el.fontSelect.value);
  const messageColor = resolveHexColor(el.messageColorText.value, el.messageColorPicker.value, '#00ff66');
  const psColor = resolveHexColor(el.psColorText.value, el.psColorPicker.value, '#ffffff');
  if(isFullHexColor(el.messageColorText.value)){ el.messageColorText.value = messageColor; }
  if(isFullHexColor(el.psColorText.value)){ el.psColorText.value = psColor; }
  el.messageColorPicker.value = messageColor;
  el.psColorPicker.value = psColor;
  el.livePreview.style.backgroundImage = bg ? `url('${bg.file}')` : 'none';
  el.livePreview.style.fontFamily = `"${font?.font || 'Share Tech Mono'}"${FONT_FALLBACK}`;
  el.previewPrefix.textContent = fillerState.prefixLines.join('\n');
  el.previewSuffix.textContent = fillerState.suffixLines.join('\n');
  el.previewPrefix.style.color = psColor; el.previewSuffix.style.color = psColor;
  el.previewPrefix.style.fontSize = clamp(el.psFontSize.value,10,60,12)+'px';
  el.previewSuffix.style.fontSize = clamp(el.psFontSize.value,10,60,12)+'px';
  el.previewMsg.style.color = messageColor; el.previewMsg.style.fontSize = clamp(el.msgFontSize.value,12,80,20)+'px';
  if(el.showLogo.checked && logo){ el.previewLogo.src=logo.file; el.previewLogo.style.display='block'; } else { el.previewLogo.style.display='none'; }
  const fillersOff = !el.fillersEnabled.checked;
  el.fillerLineCount.disabled = fillersOff;
  el.fillersHint.textContent = fillersOff ? 'Fillery wyłączone — pole nieaktywne.' : 'Fillery aktywne.';
  el.fillersHint.className = 'small' + (fillersOff ? ' disabled-note' : '');
}

function getPayload(type){
  const movingOverlayEnabled = !!el.movingOverlay.checked;
  const flickerEnabled = movingOverlayEnabled && !!el.flicker.checked;
  const bg = safeGet(manifest.backgrounds || [], el.backgroundSelect.value);
  const logo = safeGet(manifest.logos || [], el.logoSelect.value);
  const filler = safeGet(manifest.fillers || [], el.fillerSelect.value);
  const font = safeGet(manifest.fonts || [], el.fontSelect.value);
  const audio = safeGet(manifest.audios || [], el.audioSelect.value);
  return {
    type,
    text: type === 'message' ? (el.message.value || '') : '',
    backgroundId:bg?.id || null, backgroundFile:bg?.file || '',
    logoId:logo?.id || null, logoFile:logo?.file || '',
    fillerId:filler?.id || null, fillerSet:filler?.name || '',
    fontId:font?.id || null, fontPreset:font?.font || '',
    messageAudioId:audio?.id || null, messageAudioFile:audio?.file || '',
    fillersEnabled:!!el.fillersEnabled.checked, audioEnabled:!!el.audioEnabled.checked,
    showLogo:!!el.showLogo.checked, movingOverlay:movingOverlayEnabled, flicker:flickerEnabled,
    prefixLines: el.fillersEnabled.checked ? fillerState.prefixLines : [],
    suffixLines: el.fillersEnabled.checked ? fillerState.suffixLines : [],
    fillerLineCount: clamp(el.fillerLineCount.value,1,5,3),
    fillerBandLines: clamp(el.fillerBandLines.value,1,6,2),
    messageColor: resolveHexColor(el.messageColorText.value, el.messageColorPicker.value, '#00ff66'),
    prefixColor: resolveHexColor(el.psColorText.value, el.psColorPicker.value, '#ffffff'),
    suffixColor: resolveHexColor(el.psColorText.value, el.psColorPicker.value, '#ffffff'),
    msgFontSize: clamp(el.msgFontSize.value,12,80,20),
    prefixFontSize: clamp(el.psFontSize.value,10,60,12),
    suffixFontSize: clamp(el.psFontSize.value,10,60,12),
    pingUrl: PING_URL,
    nonce: nonce(),
    ts: firebase.firestore.FieldValue.serverTimestamp(),
  };
}

async function send(type){
  setStatus('wysyłam…');
  await currentRef.set(getPayload(type), {merge:false});
  setStatus(type === 'clear' ? 'wyczyszczono' : 'wysłano');
}

async function ping(){
  setStatus('ping…');
  await currentRef.set({...getPayload('ping'), text: undefined, type:'ping'}, {merge:true});
  setStatus('ping wysłany');
}

function restoreDefaults(sendReset=true){
  const pick = (list, wanted) => list.some(x=>x.id===wanted) ? wanted : (list[0]?.id || '');
  el.backgroundSelect.value = String(pick(manifest.backgrounds || [], DEFAULT_FORM_STATE.backgroundId));
  el.logoSelect.value = String(pick(manifest.logos || [], DEFAULT_FORM_STATE.logoId));
  el.fillerSelect.value = String(pick(manifest.fillers || [], DEFAULT_FORM_STATE.fillerId));
  el.fontSelect.value = String(pick(manifest.fonts || [], DEFAULT_FORM_STATE.fontId));
  el.audioSelect.value = String(pick(manifest.audios || [], DEFAULT_FORM_STATE.audioId));
  el.showLogo.checked = DEFAULT_FORM_STATE.showLogo; el.movingOverlay.checked = DEFAULT_FORM_STATE.movingOverlay; el.flicker.checked = DEFAULT_FORM_STATE.flicker; el.fillersEnabled.checked = DEFAULT_FORM_STATE.fillersEnabled; el.audioEnabled.checked = DEFAULT_FORM_STATE.audioEnabled;
  el.fillerLineCount.value = String(DEFAULT_FORM_STATE.fillerLineCount);
  el.fillerBandLines.value = String(DEFAULT_FORM_STATE.fillerBandLines);
  el.messageColorText.value = DEFAULT_FORM_STATE.messageColor; el.messageColorPicker.value = '#00ff66';
  el.psColorText.value = DEFAULT_FORM_STATE.prefixSuffixColor; el.psColorPicker.value = DEFAULT_FORM_STATE.prefixSuffixColor;
  el.msgFontSize.value = String(DEFAULT_FORM_STATE.msgFontSize); el.psFontSize.value = String(DEFAULT_FORM_STATE.psFontSize);
  el.message.value = '';
  setPreviewMode(DEFAULT_FORM_STATE.previewMode);
  rerollFillers();
  if(sendReset){ send('clear').catch(e=>{setStatus('BŁĄD'); alert(e.message||e);}); }
}

['input','change'].forEach(evt=>{
  [el.backgroundSelect,el.logoSelect,el.fillerSelect,el.fontSelect,el.audioSelect,el.showLogo,el.movingOverlay,el.flicker,el.fillersEnabled,el.audioEnabled,el.fillerLineCount,el.fillerBandLines,el.messageColorText,el.msgFontSize,el.psColorText,el.psFontSize,el.previewModeCrop,el.previewModeFull].forEach(node=>node.addEventListener(evt, ()=>{
    if(node === el.previewModeCrop || node === el.previewModeFull){ setPreviewMode(getPreviewMode()); }
    renderPreview();
  }));
});
el.fillerSelect.addEventListener('change', rerollFillers);
['input','change'].forEach(evt=>el.fillerLineCount.addEventListener(evt, rerollFillers));
el.fillersEnabled.addEventListener('change', rerollFillers);
el.rerollFillersBtn.addEventListener('click', rerollFillers);
['input','change'].forEach(evt=>el.messageColorPicker.addEventListener(evt,()=>{ el.messageColorText.value = el.messageColorPicker.value; renderPreview(); }));
['input','change'].forEach(evt=>el.psColorPicker.addEventListener(evt,()=>{ el.psColorText.value = el.psColorPicker.value; renderPreview(); }));
el.messageColorText.addEventListener('blur', ()=>{ el.messageColorText.value = resolveHexColor(el.messageColorText.value, el.messageColorPicker.value, '#00ff66'); renderPreview(); });
el.psColorText.addEventListener('blur', ()=>{ el.psColorText.value = resolveHexColor(el.psColorText.value, el.psColorPicker.value, '#ffffff'); renderPreview(); });
document.querySelectorAll('.chip[data-target]').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    const color = String(chip.dataset.color || '');
    if(chip.dataset.target === 'msg'){
      el.messageColorText.value = color;
      el.messageColorPicker.value = color;
    } else {
      el.psColorText.value = color;
      el.psColorPicker.value = color;
    }
    renderPreview();
  });
});
el.sendBtn.addEventListener('click',()=>send('message').catch(e=>{setStatus('BŁĄD'); alert(e.message||e);}));
el.clearMessageBtn.addEventListener('click',()=>{el.message.value=''; el.message.focus();});
el.restoreDefaultsBtn.addEventListener('click',()=>restoreDefaults(true));
el.pingBtn.addEventListener('click',()=>ping().catch(e=>{setStatus('BŁĄD ping'); alert(e.message||e);}));
el.updateDataBtn.addEventListener('click',()=>updateDataFromXlsx());

(async()=>{
  try{ loadSavedPreviewMode(); await loadManifest(); setStatus('gotowe'); }
  catch(e){ setStatus('BŁĄD'); writeImportLog([String(e.message||e)]); alert(e.message||e); }
})();
</script>
</body>
</html>
