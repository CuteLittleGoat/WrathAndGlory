<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Infoczytnik</title>
  <script>
    (function autoCacheBust(){
      const INF_VERSION = "2026-03-31_09-10-12";
      window.__dsVersion = INF_VERSION;
      const url = new URL(window.location.href);
      if (url.searchParams.get("v") !== INF_VERSION) {
        url.searchParams.set("v", INF_VERSION);
        window.location.replace(url.toString());
      }
    })();
  </script>
  <style>
    :root{--font:"Share Tech Mono",Calibri,Arial,sans-serif;--msg:#00ff66;--ps:rgba(255,255,255,.88)}
    *{box-sizing:border-box} body{margin:0;background:#000;color:#fff;font-family:var(--font)}
    .screen{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:0}
    .overlay{position:absolute;z-index:2;overflow:hidden}
    .overlay::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.28);filter:blur(2px);z-index:1;pointer-events:none;opacity:0}
    .overlay.shadow::after{opacity:1}
    .overlayScroll{position:relative;z-index:2;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:2.5% 3.5%;display:flex;flex-direction:column;gap:2.5%;text-shadow:0 2px 5px rgba(0,0,0,.8)}
    .overlayScroll,.topBand,.msg,.suffix{white-space:pre-wrap;word-break:normal;overflow-wrap:normal;hyphens:manual}
    .topBand{min-height:calc(var(--fillerBandLines,2) * 1.35em);display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:start;column-gap:12px}
    .topBand.no-logo{grid-template-columns:minmax(0,1fr)}
    .prefix,.suffix{color:var(--ps);font-size:clamp(12px,2vw,20px);text-align:center}
    .msg{flex:1 0 auto;color:var(--msg);font-size:clamp(16px,2.8vw,34px);text-align:left}
    .bottomBand{min-height:calc(var(--fillerBandLines,2) * 1.35em);display:flex;align-items:flex-end;justify-content:center}
    .logo{justify-self:end;align-self:start;object-fit:contain;display:none;max-width:var(--logoSize,84px);max-height:var(--logoSize,84px)}
    .hide{display:none!important}
    .flicker{animation:flicker 7s infinite} @keyframes flicker{0%,100%{opacity:1}50%{opacity:.96}51%{opacity:.9}52%{opacity:1}}
  </style>
</head>
<body>
<div class="screen" id="screen">
  <img id="bg" class="bg" alt="layout">
  <div id="overlay" class="overlay">
    <div id="overlayScroll" class="overlayScroll">
      <div id="topBand" class="topBand">
        <div id="prefix" class="prefix"></div>
        <img id="logo" class="logo" alt="logo">
      </div>
      <div id="msg" class="msg"></div>
      <div class="bottomBand">
        <div id="suffix" class="suffix"></div>
      </div>
    </div>
  </div>
</div>
<script src="config/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.8/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.8/firebase-firestore-compat.js"></script>
<script>
const PING_URL = 'assets/audios/ping/Ping.mp3?v=' + encodeURIComponent(window.__dsVersion || '');
const FONT_FALLBACK = ', Calibri, Arial, sans-serif';
const DEFAULT_CONTENT_RECT = { x:0.10, y:0.16, w:0.80, h:0.74 };
const CONTENT_RECTS_BY_BACKGROUND_ID = {
  1:{ x:0.08, y:0.17, w:0.84, h:0.75 }, // DataSlate_01
  2:{ x:0.09, y:0.16, w:0.82, h:0.76 }, // DataSlate_02
  3:{ x:0.09, y:0.09, w:0.82, h:0.83 }, // DataSlate_03
  4:{ x:0.10, y:0.09, w:0.80, h:0.82 }, // DataSlate_04
  5:{ x:0.09, y:0.09, w:0.82, h:0.83 }, // DataSlate_05
  6:{ x:0.08, y:0.16, w:0.84, h:0.74 }, // DataSlate_Inq
  7:{ x:0.08, y:0.06, w:0.84, h:0.88 }, // Litannie_Zaginionych
  8:{ x:0.07, y:0.08, w:0.86, h:0.84 }, // Notatnik
  9:{ x:0.10, y:0.10, w:0.80, h:0.82 }  // Pergamin
};
if(!window.firebaseConfig){ throw new Error('Missing firebase config'); }
firebase.initializeApp(window.firebaseConfig);
const db = firebase.firestore();
const ref = db.collection('dataslate').doc('current');

const el = { screen:document.getElementById('screen'), bg:document.getElementById('bg'), logo:document.getElementById('logo'), overlay:document.getElementById('overlay'), overlayScroll:document.getElementById('overlayScroll'), topBand:document.getElementById('topBand'), prefix:document.getElementById('prefix'), msg:document.getElementById('msg'), suffix:document.getElementById('suffix') };
let lastNonce = '';
let currentBackgroundId = 1;
function clamp(v,min,max,d){ const n=Number(v); if(!Number.isFinite(n)) return d; return Math.min(max,Math.max(min,Math.floor(n))); }

function play(url){
  const a = new Audio(url || PING_URL); a.volume = 1; a.play().catch(()=>{});
}
function applyStyles(d){
  const msgColor = String(d.messageColor || d.color || '#00ff66');
  const psColor = String(d.prefixColor || 'rgba(255,255,255,.88)');
  document.documentElement.style.setProperty('--msg', msgColor);
  document.documentElement.style.setProperty('--ps', psColor);
  el.msg.style.fontSize = String(d.msgFontSize || '20px');
  el.prefix.style.fontSize = String(d.prefixFontSize || '12px');
  el.suffix.style.fontSize = String(d.suffixFontSize || '12px');
  const family = String(d.fontPreset || 'Share Tech Mono');
  document.documentElement.style.setProperty('--font', `"${family}"${FONT_FALLBACK}`);
  document.documentElement.style.setProperty('--fillerBandLines', String(clamp(d.fillerBandLines,1,6,2)));
}
function applyLayout(d){
  currentBackgroundId = Number(d.backgroundId) || 1;
  el.bg.src = d.backgroundFile || 'assets/backgrounds/DataSlate_04.png';
  if(d.showLogo === false || !d.logoFile){
    el.logo.classList.add('hide');
    el.logo.style.display = 'none';
    el.topBand.classList.add('no-logo');
  } else {
    el.logo.classList.remove('hide');
    el.logo.style.display = 'block';
    el.logo.src = d.logoFile;
    el.topBand.classList.remove('no-logo');
  }
  el.overlay.classList.toggle('shadow', d.movingOverlay !== false);
  el.overlay.classList.toggle('flicker', d.flicker === true);
  el.overlayScroll.scrollTop = 0;
  fitOverlayToBackground();
}
function applyMessage(d){
  const prefix = (Array.isArray(d.prefixLines) ? d.prefixLines.join('\n') : (d.prefix || ''));
  const suffix = (Array.isArray(d.suffixLines) ? d.suffixLines.join('\n') : (d.suffix || ''));
  el.prefix.textContent = d.fillersEnabled === false ? '' : prefix;
  el.suffix.textContent = d.fillersEnabled === false ? '' : suffix;
  el.msg.textContent = d.text || '';
}
function clearMessage(){ el.prefix.textContent=''; el.suffix.textContent=''; el.msg.textContent=''; }
function fitOverlayToBackground(){
  const vw = window.innerWidth || document.documentElement.clientWidth || 0;
  const vh = window.innerHeight || document.documentElement.clientHeight || 0;
  const nw = el.bg.naturalWidth || vw;
  const nh = el.bg.naturalHeight || vh;
  if(!vw || !vh || !nw || !nh){
    el.overlay.style.left = '0px'; el.overlay.style.top = '0px'; el.overlay.style.width = '100vw'; el.overlay.style.height = '100vh';
    return;
  }
  const scale = Math.min(vw / nw, vh / nh);
  const rw = Math.max(1, Math.round(nw * scale));
  const rh = Math.max(1, Math.round(nh * scale));
  const frameLeft = Math.round((vw - rw) / 2);
  const frameTop = Math.round((vh - rh) / 2);
  const rect = CONTENT_RECTS_BY_BACKGROUND_ID[currentBackgroundId] || DEFAULT_CONTENT_RECT;
  const left = frameLeft + Math.round(rw * rect.x);
  const top = frameTop + Math.round(rh * rect.y);
  const width = Math.max(1, Math.round(rw * rect.w));
  const height = Math.max(1, Math.round(rh * rect.h));
  el.overlay.style.left = `${left}px`;
  el.overlay.style.top = `${top}px`;
  el.overlay.style.width = `${width}px`;
  el.overlay.style.height = `${height}px`;
  const logoSize = Math.max(38, Math.round(width * 0.14));
  document.documentElement.style.setProperty('--logoSize', `${logoSize}px`);
}
el.bg.addEventListener('load', fitOverlayToBackground);
window.addEventListener('resize', fitOverlayToBackground);

ref.onSnapshot((snap)=>{
  const d = snap.data();
  if(!d) return;
  if(d.nonce && d.nonce === lastNonce) return;
  lastNonce = d.nonce || '';

  applyLayout(d); applyStyles(d);
  if(d.type === 'ping'){ play(PING_URL); return; }
  if(d.type === 'clear'){ clearMessage(); return; }
  applyMessage(d);
  if(d.type === 'message' && d.audioEnabled !== false){ play(d.messageAudioFile); }
});
</script>
</body>
</html>
