<script>
  (function autoCacheBust(){
      const INF_VERSION = "2026-03-29_11-59-36"; // <- zmieniaj przy aktualizacjach (data + godzina)
    window.__dsVersion = INF_VERSION;    // spójne dla assetów i cache-bustingu
    const url = new URL(window.location.href);
    if (url.searchParams.get("v") !== INF_VERSION) {
      url.searchParams.set("v", INF_VERSION);
      window.location.replace(url.toString());

<style>
  :root{
    --accent:#00ff66;
    --font: Calibri, Arial, sans-serif;

    --screen-top: 14%;
    --screen-right: 14%;
    --screen-bottom: 22%;
    --screen-left: 18%;

    --msg-font-size: clamp(18px, 3.4vw, 32px);
    --prefix-font-size: clamp(12px, 2.0vw, 16px);
    --suffix-font-size: clamp(12px, 2.0vw, 16px);

    --filler-gap: clamp(12px, 2vw, 18px);
    --gap-prefix-to-msg: var(--filler-gap);
    --gap-msg-to-suffix: var(--filler-gap);

    --prefix-color: rgba(255,255,255,.88);
    --suffix-color: rgba(255,255,255,.86);
  }

  *{box-sizing:border-box}
  html,body{height:100%; margin:0; background:#000; overflow:hidden;}
  body{color:var(--accent); font-family:var(--font);}

  .wrap{
    width:100vw; height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    overflow:hidden;
  }

  .panel{
    position:relative;
    overflow:hidden;
    background:#000;
  }

  .layout-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }

  .panel.pergamin .layout-img{
    object-fit: cover;
  }

  .crt::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.06) 0px,
        rgba(255,255,255,.06) 1px,
        rgba(0,0,0,0) 3px,
        rgba(0,0,0,0) 7px
      );
    opacity:.28;
    mix-blend-mode: overlay;
    animation: scanMove 12s linear infinite;
  }
  .crt::after{
    content:"";
    position:absolute;
    inset:-2%;
    pointer-events:none;
    background:
      radial-gradient(closest-side, rgba(0,0,0,0) 60%, rgba(0,0,0,.70) 100%),
      rgba(255,255,255,.04);
    opacity:.65;
  }
  @keyframes scanMove { 0%{transform:translateY(0)} 100%{transform:translateY(20px)} }
  @keyframes flickerBg {
    0%,92%,100%{opacity:.65}
    93%{opacity:.55}
    95%{opacity:.72}
    97%{opacity:.60}
  }

  .screen{
    position:absolute;
    top:var(--screen-top);
    right:var(--screen-right);
    bottom:var(--screen-bottom);
    left:var(--screen-left);

    overflow:auto;
    -webkit-overflow-scrolling:touch;
    padding: clamp(14px, 2.4vw, 24px);
    display:flex;
    flex-direction:column;
    text-shadow: 0 2px 6px rgba(0,0,0,.70);
    z-index: 2;
  }

  .contentLayer{
    position:relative;
    display:flex;
    flex-direction:column;
    min-height:100%;
  }

  .screenOverlay{
    position:absolute;
    top:var(--screen-top);
    right:var(--screen-right);
    bottom:var(--screen-bottom);
    left:var(--screen-left);
    pointer-events:none;
    z-index: 1;
  }

  .screenOverlay.with-overlay::after{
    content:"";
    position:absolute;
    inset:-2%;
    pointer-events:none;
    background:
      radial-gradient(closest-side, rgba(0,0,0,0) 60%, rgba(0,0,0,.70) 100%),
      rgba(255,255,255,.04);
    opacity:.65;
    animation: flickerBg 9s infinite;
  }

  .screenOverlay.no-flicker.with-overlay::after{
    animation: none;
  }

  .contentLayer > *{
    position: relative;
    z-index: 1;
  }

  .prefixRow{
    position:relative;
    display:block;
    margin-bottom: var(--gap-prefix-to-msg);
    padding-right: 66px;
  }

  .prefix{
    flex: 1 1 auto;
    color: var(--prefix-color);
    font-size: var(--prefix-font-size);
    letter-spacing: 1.5px;
    margin: 0;
    white-space: pre-wrap;
  }

  .logoBox{
    position:absolute;
    top:0;
    right:0;
    width:54px;
    height:54px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .logo{
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    opacity:.95;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.7));
    pointer-events:none;
    user-select:none;
    display:none;
  }

  .msg{
    margin:0;
    position:relative;
    font-size: var(--msg-font-size);
    line-height: 1.35;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--accent);
    text-shadow: 0 0 18px rgba(0,255,120,.18), 0 2px 6px rgba(0,0,0,.70);
  }

  .suffixRow{
    display:flex;
    align-items:flex-start;
    margin-top: var(--gap-msg-to-suffix);
  }
  .suffix{
    color: var(--suffix-color);
    font-size: var(--suffix-font-size);
    letter-spacing: 1.5px;
    margin: 0;
    white-space: pre-wrap;
  }




</style>

      suffixes:["+++ GLORY TO CHAOS +++","+++ DARK GODS SMILE +++","+++ THE EYE OPENS +++","+++ ASCEND AND BURN +++","+++ ALL HAIL THE DARK GODS +++","+++ REALSPACE BLEEDS +++","+++ STARS ARE WRONG +++","+++ VOID WITHIN +++","+++ ETERNAL CHANGE +++","+++ LET THE GALAXY BREAK +++","+++ THE VEIL IS TORN +++","+++ OFFERING ACCEPTED +++","+++ THE RUINOUS POWERS PROVIDE +++","+++ CORRUPTION WITHOUT MASTER +++","+++ CHAOS IS ASCENDANT +++","+++ THE LONG WAR ENDURES +++","+++ REALITY YIELDS +++","+++ THE WARP CLAIMS ALL +++","+++ BLESSED BE THE DAMNED +++","+++ NIGHT COMES FROM WITHIN +++","+++ ACCESS SEALED +++","+++ SYSTEM CLEANSED +++","+++ THE EMPEROR PROTECTS +++"]
    },
    pismo_odreczne: {
      prefixes:[],
      suffixes:[]
    },
    pismo_ozdobne: {
      prefixes:[],
      suffixes:[]
    },
  };

  const FACTION_LOGO = {
    inquisition: `assets/logos/inquisition/Inquisition.png?v=${ASSET_VERSION}`,
    mechanicus:  `assets/logos/mechanicus/Mechanicus.png?v=${ASSET_VERSION}`
  };

  const el = {
    panel: document.getElementById("panel"),
    layoutImg: document.getElementById("layoutImg"),
    screen: document.getElementById("screen"),
    screenOverlay: document.getElementById("screenOverlay"),
    contentLayer: document.getElementById("contentLayer"),
    prefixLine: document.getElementById("prefixLine"),
    suffixLine: document.getElementById("suffixLine"),
    msg: document.getElementById("msg"),
    logo: document.getElementById("logo"),
  };


  async function ensureServiceWorkerRegistration(){
    if(!("serviceWorker" in navigator)) return null;

    const registration = await navigator.serviceWorker.register("../service-worker.js");
    return registration;
  }

  async function tryLockPortrait(){
    try{
      if(screen.orientation && typeof screen.orientation.lock === "function"){
        await screen.orientation.lock("portrait");
      }
    }catch(_error){
      // Cichy fallback zgodnie z wymaganiem: bez komunikatu dla użytkownika.
    }
  }

  function fitPanel(ar){
    const vw = window.innerWidth, vh = window.innerHeight;
    let h = vh, w = h * ar;
    if(w > vw){ w = vw; h = w / ar; }
    el.panel.style.width  = Math.round(w) + "px";
    el.panel.style.height = Math.round(h) + "px";
  }

  function setInsets(p){
    document.documentElement.style.setProperty("--screen-top", p.top);
    document.documentElement.style.setProperty("--screen-right", p.right);
    document.documentElement.style.setProperty("--screen-bottom", p.bottom);
    document.documentElement.style.setProperty("--screen-left", p.left);
  }

  function setOverlayState(shouldShowOverlay, shouldFlicker){
    el.screenOverlay.classList.toggle("with-overlay", shouldShowOverlay === true);
    if(shouldFlicker === false || shouldShowOverlay === false){
      el.screenOverlay.classList.add("no-flicker");
    }else{
      el.screenOverlay.classList.remove("no-flicker");
    }
  }

  function setPergaminMode(isPergamin){
    el.panel.classList.toggle("pergamin", isPergamin);
  }

  let currentAr = LAYOUT_AR.default04;

  function isRestrictedLayout(faction){
    return faction === "pismo_odreczne" || faction === "pismo_ozdobne";
  }

  function setLogoForFaction(key, shouldShow){
    if(!shouldShow){
      el.logo.removeAttribute("src");
      el.logo.style.display = "none";
      return;
    }

    const src = FACTION_LOGO[key];
    if(!src){
      el.logo.removeAttribute("src");
      el.logo.style.display = "none";
      return;
    }

    el.logo.src = src;
    el.logo.style.display = "block";
  }

  function getFillerText(key, idx1based, kind){
    const cfg = FILLERS[key] || FILLERS.mechanicus;
    const arr = (kind === "prefix") ? cfg.prefixes : cfg.suffixes;
    const n = Number(idx1based);
    const i = (Number.isFinite(n) ? Math.floor(n) : 1) - 1;
    return arr[Math.max(0, Math.min(arr.length - 1, i))] || "";
  }

  function applyLayout(factionKey, color, showLogo){
    const key = (factionKey && LAYOUT_BG[factionKey]) ? factionKey : "mechanicus";
    el.layoutImg.src = LAYOUT_BG[key] || LAYOUT_BG.mechanicus;

    document.documentElement.style.setProperty("--font", FONT_STACK[key] || 'Calibri, Arial, sans-serif');
    document.documentElement.style.setProperty("--accent", color || "#00ff66");

    if(key === "inquisition"){
      setPergaminMode(false);
      setInsets(SCREEN_INSETS.inquisition);
      currentAr = LAYOUT_AR.inquisition;
    }else if(key === "militarum"){
      setPergaminMode(false);
      setInsets(SCREEN_INSETS.militarum);
      currentAr = LAYOUT_AR.militarum;
    }else if(isRestrictedLayout(key)){
      setPergaminMode(true);
      setInsets(SCREEN_INSETS.pergamin);
      currentAr = LAYOUT_AR.pergamin;
    }else{
      setPergaminMode(false);
      setInsets(SCREEN_INSETS.default04);
      currentAr = LAYOUT_AR.default04;
    }
    fitPanel(currentAr);
    setLogoForFaction(key, showLogo !== false);
  }

  function applyTextStyleFromDoc(d){
    if(d.msgFontSize)    document.documentElement.style.setProperty("--msg-font-size", String(d.msgFontSize));
    if(d.prefixFontSize) document.documentElement.style.setProperty("--prefix-font-size", String(d.prefixFontSize));
    if(d.suffixFontSize) document.documentElement.style.setProperty("--suffix-font-size", String(d.suffixFontSize));
    if(d.prefixColor)    document.documentElement.style.setProperty("--prefix-color", String(d.prefixColor));
    if(d.suffixColor)    document.documentElement.style.setProperty("--suffix-color", String(d.suffixColor));
  }

  function showMessage(prefix, text, suffix){
    el.prefixLine.textContent = prefix || "";
    el.msg.textContent = text || "";
    el.suffixLine.textContent = suffix || "";
    el.screen.scrollTop = 0;
  }

  function clearMessageKeepLayout(){
    el.prefixLine.textContent = "";
    el.msg.textContent = "";
    el.suffixLine.textContent = "";
  }

  window.addEventListener("resize", () => fitPanel(currentAr));

  function resolveLocalAudioUrl(rawUrl, fallbackUrl){
    if(typeof rawUrl !== "string") return fallbackUrl;

    const candidate = rawUrl.trim();
    if(!candidate) return fallbackUrl;

    // Dopuszczamy wyłącznie lokalne ścieżki (repo) — bez zewnętrznych hostów.
    if(/^assets\/audio\//i.test(candidate)) return candidate;
    if(/^\.\/?assets\/audio\//i.test(candidate)) return candidate;

    // Opcjonalnie: absolutny URL, ale tylko do bieżącego origin i ścieżki assets/audio.
    try{
      const parsed = new URL(candidate, window.location.href);
      if(parsed.origin === window.location.origin && /^\/?.*assets\/audio\//i.test(parsed.pathname)){
        return parsed.pathname + parsed.search + parsed.hash;
      }
    }catch(e){
      // Ignorujemy błędny URL i przechodzimy do fallbacku.
    }

    console.warn("[Infoczytnik] Odrzucono zewnętrzny lub nieprawidłowy URL audio:", candidate);
    return fallbackUrl;
  }

  const currentRef = doc(db, "dataslate", "current");
  let lastNonce = null;

  onSnapshot(currentRef, (snap)=>{
    if(!snap.exists()) return;
    const d = snap.data() || {};

    if(d.nonce && d.nonce === lastNonce) return;
    lastNonce = d.nonce || null;

    const faction = d.faction || "mechanicus";
    const color   = d.color || d.fontColor || "#00ff66";
    const restricted = isRestrictedLayout(faction);
    const showLogo = restricted ? false : (d.showLogo !== false);
    const movingOverlay = restricted ? false : (d.movingOverlay !== false);
    const flicker = movingOverlay ? (restricted ? false : (d.flicker !== false)) : false;

    applyLayout(faction, color, showLogo);
    setOverlayState(movingOverlay, flicker);
    applyTextStyleFromDoc(d);

    if(d.type === "clear"){
      clearMessageKeepLayout();
      return;
    }

    if(d.type === "ping"){
      const pingUrl = resolveLocalAudioUrl(d.pingUrl ? String(d.pingUrl) : "", DEFAULT_PING_URL);
      window.__dsPlayUrlOnce(pingUrl);
      return;
    }

    if(d.type === "message"){
      const text = d.text ?? "";

      let prefix = d.prefix ?? d.prefixText ?? "";
      let suffix = d.suffix ?? d.suffixText ?? "";

      if(Array.isArray(d.prefixLines) && d.prefixLines.length){
        prefix = d.prefixLines.map((line) => String(line || "")).join("\n");
      }
      if(Array.isArray(d.suffixLines) && d.suffixLines.length){
        suffix = d.suffixLines.map((line) => String(line || "")).join("\n");
      }

      if(!restricted && !prefix && (d.prefixIndex || d.prefixIdx)){
        prefix = getFillerText(faction, d.prefixIndex || d.prefixIdx, "prefix");
      }
      if(!restricted && !suffix && (d.suffixIndex || d.suffixIdx)){
        suffix = getFillerText(faction, d.suffixIndex || d.suffixIdx, "suffix");
      }

      if(!restricted && !prefix && (text || "").trim()) prefix = getFillerText(faction, 1, "prefix");
      if(!restricted && !suffix && (text || "").trim()) suffix = getFillerText(faction, 1, "suffix");

      if(restricted){
        prefix = "";
        suffix = "";
      }

      if((text || "").trim().length === 0){
        clearMessageKeepLayout();
      }else{
        showMessage(prefix, text, suffix);
      }

      const msgUrl = resolveLocalAudioUrl(
        (d.msgUrl || d.messageUrl) ? String(d.msgUrl || d.messageUrl) : "",
        DEFAULT_MSG_URL
      );
      const shouldPlayMessageAudio = !restricted && d.disableMessageAudio !== true;
      if(shouldPlayMessageAudio){
        window.__dsPlayUrlOnce(msgUrl);
      }
    }
  });


  ensureServiceWorkerRegistration().catch((error) => {
    console.warn("Nie udało się zarejestrować globalnego Service Workera.", error);
  });

  tryLockPortrait();

  // Start
  applyLayout("mechanicus", "#00ff66");
  setOverlayState(true, true);
</script>
</body>
</html>
